name: Update profile README

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * 1"

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: sreearpita
          GITHUB_ORGS: NUS-MTechSE-DMSS
          GITHUB_EXCLUDED_REPOS: ""
          GITHUB_EXCLUDED_ORGS: ""
          MAX_DISCOVERY_SEARCH_PAGES: 5
          X_URL: https://x.com/SreeArpitaPatra
          LINKEDIN_URL: https://www.linkedin.com/in/sree-arpita-patra/
          EMAIL: sreearpitapatra@gmail.com
          WEBSITE_URL: https://sreearpita.me
        run: npm run generate

      - name: Commit README changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update generated profile README"
          file_pattern: README.md
